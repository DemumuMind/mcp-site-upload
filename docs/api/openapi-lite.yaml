openapi: 3.1.0
info:
  title: DemumuMind API Lite
  version: 2026-03-06
  description: >
    Lightweight contract snapshot for the current production API surface.
    This is not a full schema-first spec, but it tracks stable route paths,
    auth expectations, and high-level response semantics.
servers:
  - url: https://demumumind.example
paths:
  /api/health:
    get:
      summary: Public readiness check
      responses:
        "200":
          description: Readiness payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health-check:
    get:
      summary: Run full health-check job
      security:
        - bearerCron: []
      responses:
        "200":
          description: Health-check result
        "500":
          description: Internal error
    post:
      summary: Run full health-check job
      security:
        - bearerCron: []
      responses:
        "200":
          description: Health-check result
        "500":
          description: Internal error
  /api/catalog/search:
    get:
      summary: Search catalog entries
      responses:
        "200":
          description: Search results
        "400":
          description: Invalid request
        "500":
          description: Internal error
  /api/catalog/automation-status:
    get:
      summary: Read catalog automation runtime status
      security:
        - bearerCron: []
      responses:
        "200":
          description: Automation status payload
  /api/catalog/health-check:
    get:
      summary: Run catalog health check
      security:
        - bearerCron: []
      responses:
        "200":
          description: Catalog health-check result
        "500":
          description: Internal error
    post:
      summary: Run catalog health check
      security:
        - bearerCron: []
      responses:
        "200":
          description: Catalog health-check result
        "500":
          description: Internal error
  /api/catalog/auto-sync:
    get:
      summary: Run catalog GitHub auto-sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "207":
          description: Partial sync failure
        "409":
          description: Lock already held
        "500":
          description: Internal error
    post:
      summary: Run catalog GitHub auto-sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "207":
          description: Partial sync failure
        "409":
          description: Lock already held
        "500":
          description: Internal error
  /api/catalog/npm-sync:
    get:
      summary: Run catalog NPM sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "500":
          description: Internal error
    post:
      summary: Run catalog NPM sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "500":
          description: Internal error
  /api/catalog/smithery-sync:
    get:
      summary: Run catalog Smithery sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "500":
          description: Internal error
    post:
      summary: Run catalog Smithery sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "500":
          description: Internal error
  /api/catalog/sync-all:
    get:
      summary: Run full catalog sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "207":
          description: Partial sync failure
        "409":
          description: Lock already held
        "500":
          description: Internal error
    post:
      summary: Run full catalog sync
      security:
        - bearerCron: []
      responses:
        "200":
          description: Sync completed
        "207":
          description: Partial sync failure
        "409":
          description: Lock already held
        "500":
          description: Internal error
  /api/tasks:
    post:
      summary: Create agent task
      security:
        - bearerTasks: []
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCreateResponse"
        "400":
          description: Invalid JSON or malformed body
        "401":
          description: Unauthorized
        "500":
          description: Store error
  /api/tasks/{id}:
    get:
      summary: Read agent task by id
      security:
        - bearerTasks: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskGetResponse"
        "400":
          description: Invalid id
        "401":
          description: Unauthorized
        "404":
          description: Task not found
        "500":
          description: Store error
  /api/auth/security:
    post:
      summary: Auth precheck and login-result reporting
      responses:
        "200":
          description: Security response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSecurityResponse"
        "400":
          description: Invalid JSON, email, or action
  /api/cookie-consent:
    get:
      summary: Read cookie consent state
      responses:
        "200":
          description: Consent state
    post:
      summary: Store cookie consent state
      responses:
        "200":
          description: Consent saved
        "400":
          description: Invalid JSON or consent payload
    delete:
      summary: Clear cookie consent state
      responses:
        "200":
          description: Consent cleared
  /api/blog/auto-publish:
    get:
      summary: Deprecated blog v1 auto-publish
      security:
        - bearerCron: []
      responses:
        "200":
          description: Batch completed
        "207":
          description: Partial batch failure
        "409":
          description: Disabled by blog v2 flag
        "500":
          description: Internal error
    post:
      summary: Deprecated blog v1 auto-publish
      security:
        - bearerCron: []
      responses:
        "200":
          description: Batch completed
        "207":
          description: Partial batch failure
        "409":
          description: Disabled by blog v2 flag
        "500":
          description: Internal error
  /api/admin/blog-v2/generate:
    post:
      summary: Generate blog v2 draft
      security:
        - bearerAdmin: []
      responses:
        "200":
          description: Draft and preview payload
        "400":
          description: Invalid JSON
        "401":
          description: Unauthorized
        "422":
          description: Invalid payload
        "500":
          description: Draft generation failure
  /api/admin/blog-v2/preview:
    post:
      summary: Preview blog v2 draft
      security:
        - bearerAdmin: []
      responses:
        "200":
          description: Preview payload
        "400":
          description: Invalid JSON
        "401":
          description: Unauthorized
        "422":
          description: Invalid payload
        "500":
          description: Preview failure
  /api/admin/blog-v2/publish:
    post:
      summary: Publish blog v2 draft
      security:
        - bearerAdmin: []
      responses:
        "200":
          description: Publish result
        "400":
          description: Invalid JSON
        "401":
          description: Unauthorized
        "422":
          description: Invalid payload
        "500":
          description: Publish failure
  /api/admin/multi-agent/weekly-export:
    get:
      summary: Export weekly multi-agent telemetry
      security:
        - bearerAdmin: []
      responses:
        "200":
          description: CSV export
        "401":
          description: Unauthorized
        "500":
          description: Internal error
  /api/admin/security-events/export:
    get:
      summary: Export security events CSV
      security:
        - bearerAdmin: []
      responses:
        "200":
          description: CSV export
        "400":
          description: Invalid time filter
        "401":
          description: Unauthorized
        "500":
          description: Internal error
  /api/multi-agent/demo:
    post:
      summary: Run public multi-agent demo pipeline
      responses:
        "200":
          description: Demo result
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized
        "429":
          description: Rate limited
        "500":
          description: Internal execution error
  /api/multi-agent/health:
    get:
      summary: Read multi-agent runtime health
      responses:
        "200":
          description: Multi-agent health payload
  /api/server/{slug}/probe:
    post:
      summary: Probe a server URL safely
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Probe result
        "400":
          description: Invalid or unsafe server URL
        "401":
          description: Unauthorized
        "404":
          description: Server not found
        "502":
          description: Probe request failed
components:
  securitySchemes:
    bearerCron:
      type: http
      scheme: bearer
      description: Cron secret bearer token
    bearerAdmin:
      type: http
      scheme: bearer
      description: Admin token or resolved admin session
    bearerTasks:
      type: http
      scheme: bearer
      description: Tasks API bearer token
  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        readiness:
          type: string
        liveness:
          type: string
        planVersion:
          type: string
        checkedAt:
          type: string
          format: date-time
    TaskCreateResponse:
      type: object
      properties:
        ok:
          type: boolean
        taskId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    TaskGetResponse:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: string
        status:
          type: string
        startedAt:
          type:
            - string
            - "null"
        finishedAt:
          type:
            - string
            - "null"
        durationMs:
          type:
            - integer
            - "null"
        errorSummary:
          type:
            - string
            - "null"
        deltaEta:
          type:
            - string
            - "null"
        intent:
          type: string
        constraints:
          type: array
          items:
            type: string
        contextRefs:
          type: array
          items:
            type: string
    AuthSecurityResponse:
      type: object
      properties:
        ok:
          type: boolean
        failedAttemptsInWindow:
          type: integer
        maxFailedAttempts:
          type: integer
        retryAfterSeconds:
          type: integer
        alert:
          oneOf:
            - type: "null"
            - type: object
